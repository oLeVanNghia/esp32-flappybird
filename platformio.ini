; ============================================================
;  Flabby Bird — ESP32-S3 N16R8  (2.8" ILI9341 + FT6336G)
; ============================================================
[env:esp32s3_flabbybird]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = arduino

; ── Flash / PSRAM ────────────────────────────────────────────
board_build.flash_mode          = qio
board_build.flash_size          = 16MB
board_build.arduino.memory_type = qio_opi   ; OPI PSRAM (N16R8)
board_upload.flash_size         = 16MB

; ── Serial monitor ───────────────────────────────────────────
monitor_speed = 115200

; ── Libraries ────────────────────────────────────────────────
lib_deps =
    adafruit/Adafruit ILI9341 @ ^1.6.0
    adafruit/Adafruit GFX Library @ ^1.11.9
    adafruit/Adafruit BusIO @ ^1.14.5

; ── Build flags ──────────────────────────────────────────────
build_flags =
    -DBOARD_HAS_PSRAM
    -DCONFIG_I2S_SUPPRESS_DEPRECATE_WARN=1
    -DCORE_DEBUG_LEVEL=0
